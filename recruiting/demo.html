<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CORE Recruiting — Demo</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="assets/recruiting.css" />
    <script>
      (() => {
        const AS = new URLSearchParams(location.search).get("as") || "admin";
        const ME = "u-admin";
        const teams = [{ id: "t1", name: "Desert Hawks", short_code: "HAWK22" }, { id: "t2", name: "Valley Wolves", short_code: "WOLF88" }];
        const profiles = [
          { id: ME, team_id: "t1", region_id: "r1", role: AS, name: "Michael Sperry", email: "m@x.com" },
          { id: "u1", team_id: "t1", region_id: "r1", role: "manager", name: "Sam Patel", email: "sam@x.com" },
          { id: "u2", team_id: "t2", region_id: "r1", role: "rep", name: "Maria Lopez", email: "maria@x.com" },
        ];
        const S = ["Interested", "Contacted", "1st Meeting Set", "1st Meeting Sat", "2nd Meeting Set", "2nd Meeting Sat", "Docs Sent", "Docs Signed", "Ready to Sell/Train"];
        const F = ["Needs More Info", "Needs Another Meeting", "Thinking It Over", "Stagnant"];
        const stages = S.map((name, i) => ({ id: "s" + i, name, kind: "stage", position: i + 1, is_final: i === S.length - 1 }))
          .concat(F.map((name, i) => ({ id: "f" + i, name, kind: "flag", position: i + 1, is_final: false })));
        const candidates = [
          { id: "c1", name: "Jordan Blake", phone: "(555) 200-1000", email: "jb@x.com", source: "referral", stage_id: "s0", flag_id: null, recruiter_id: ME, team_id: "t1", owner_id: ME, follow_up_date: "2026-07-20", hired: false, notes: "Met at gym", created_at: "2026-07-10T10:00:00Z" },
          { id: "c2", name: "Priya Shah", phone: "(555) 200-1001", email: "ps@x.com", source: "event", stage_id: "s2", flag_id: "f2", recruiter_id: "u1", team_id: "t1", owner_id: "u1", follow_up_date: "2026-07-12", hired: false, notes: "Wants evening meeting", created_at: "2026-07-08T10:00:00Z" },
          { id: "c3", name: "Chris Dunn", phone: "(555) 200-1002", email: "cd@x.com", source: "cold", stage_id: "s6", flag_id: null, recruiter_id: ME, team_id: "t1", owner_id: ME, follow_up_date: "", hired: false, notes: "", created_at: "2026-07-05T10:00:00Z" },
          { id: "c4", name: "Noah Kim", phone: "(555) 200-1003", email: "nk@x.com", source: "referral", stage_id: "s8", flag_id: null, recruiter_id: "u2", team_id: "t2", owner_id: "u2", follow_up_date: "", hired: true, notes: "Starts Monday", created_at: "2026-07-01T10:00:00Z" },
        ];
        const STORE = { pipeline_stages: stages, candidates, profiles, teams };

        function makeBuilder(table) {
          const op = { filters: {}, single: false, insertRow: null, updatePatch: null, del: false };
          const match = (r) => { for (const k in op.filters) if (r[k] !== op.filters[k]) return false; return true; };
          function exec() {
            const rows = STORE[table] || (STORE[table] = []);
            if (op.insertRow) {
              const list = Array.isArray(op.insertRow) ? op.insertRow : [op.insertRow];
              const made = list.map((r) => ({ id: "new-" + Math.random().toString(36).slice(2, 8), created_at: new Date().toISOString(), ...r }));
              made.forEach((m) => rows.push(m));
              return { data: op.single ? made[0] : made, error: null };
            }
            if (op.updatePatch) { rows.filter(match).forEach((r) => Object.assign(r, op.updatePatch)); return { data: null, error: null }; }
            if (op.del) { STORE[table] = rows.filter((r) => !match(r)); return { data: null, error: null }; }
            const out = rows.filter(match);
            return op.single ? { data: out[0] || null, error: out[0] ? null : { message: "not found" } } : { data: out, error: null };
          }
          const b = {
            select() { return b; }, insert(r) { op.insertRow = r; return b; }, update(p) { op.updatePatch = p; return b; },
            delete() { op.del = true; return b; }, eq(c, v) { op.filters[c] = v; return b; }, order() { return b; },
            single() { op.single = true; return Promise.resolve(exec()); }, then(res, rej) { return Promise.resolve(exec()).then(res, rej); },
          };
          return b;
        }

        window.__REC_MOCK_SB = {
          auth: {
            async getSession() { return { data: { session: { user: { id: ME, email: "m@x.com" } } } }; },
            onAuthStateChange() {}, async signOut() { return {}; },
            async signInWithPassword() { return { data: { session: { user: { id: ME } } }, error: null }; },
          },
          from: makeBuilder,
        };
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script src="assets/recruiting.js"></script>
  </body>
</html>
